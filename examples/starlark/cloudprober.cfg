# Run alongside mock_server.go:
#   go run examples/starlark/mock_server.go &
#   ./cloudprober --config_file=examples/starlark/cloudprober.cfg --logtostderr
#
# Watch metrics:
#   tail -f /tmp/cloudprober-starlark.metrics

probe {
  name: "trading_api_flow"
  type: STARLARK
  targets {
    host_names: "127.0.0.1:8080"
  }
  interval_msec: 5000
  timeout_msec: 3000
  starlark_probe {
    source_file: "examples/starlark/trading_api.star"
  }
}

surfacer {
  type: FILE
  file_surfacer {
    file_path: "/tmp/cloudprober-starlark.metrics"
  }
}
