# Illustrative config for gcp_jwt_oauth.star -- the oauth-builtin counterpart to
# gcp_jwt.cfg. The self-signed JWT is defined here (oauth_configs, `jwt` source)
# rather than built in the script with jwt.encode; the script just calls
# oauth.header("gcp"). Same claims (iss/sub/aud), key, kid, and lifetime, so the
# minted token is equivalent -- cloudprober handles minting and re-minting.
#
# Load the three fields from the service-account JSON key file into env vars,
# e.g. with jq, before starting cloudprober:
#   export GCP_SA_EMAIL=$(jq -r .client_email key.json)
#   export GCP_SA_PRIVATE_KEY=$(jq -r .private_key key.json)
#   export GCP_SA_PRIVATE_KEY_ID=$(jq -r .private_key_id key.json)
#   export GCP_PROJECT=my-project

probe {
  name: "gcp_storage_jwt_oauth"
  type: STARLARK
  targets {
    dummy_targets {}  # No network target; the script picks its own URL.
  }
  interval_msec: 30000
  timeout_msec: 10000
  starlark_probe {
    source_file: "examples/starlark/gcp_jwt_oauth.star"
    vars { key: "project" value: "{{ env "GCP_PROJECT" }}" }
    oauth_configs {
      key: "gcp"
      value {
        jwt {
          private_key: "{{ envSecret "GCP_SA_PRIVATE_KEY" }}"
          # aud scopes the token to an API; for a self-signed JWT it is the
          # service's base URL. iat/exp are filled in from lifetime_sec.
          claims { key: "iss" value: "{{ env "GCP_SA_EMAIL" }}" }
          claims { key: "sub" value: "{{ env "GCP_SA_EMAIL" }}" }
          claims { key: "aud" value: "https://storage.googleapis.com/" }
          # kid (the key's private_key_id) lets Google pick the right key.
          header { key: "kid" value: "{{ env "GCP_SA_PRIVATE_KEY_ID" }}" }
          lifetime_sec: 3600
        }
      }
    }
  }
}
