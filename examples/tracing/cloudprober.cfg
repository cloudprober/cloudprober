# This config probes google.com over HTTP and enables distributed tracing.
#
# Cloudprober is the client, so it starts the root span for each sampled
# request and propagates W3C trace context (traceparent header) to the target.
# Spans are exported to an OpenTelemetry collector over OTLP/gRPC.

probe {
    name: "http_google"
    type: HTTP
    targets {
        host_names: "google.com"
    }
    http_probe {
        scheme: HTTPS
    }
    interval_msec: 5000
    timeout_msec: 2000
}

# Top-level tracing config. Its presence instruments all tracing-capable probes
# (HTTP today). Without it, no spans are created. See:
# https://cloudprober.org/
tracing {
    otlp_grpc_exporter {
        # Address of the OpenTelemetry collector's OTLP/gRPC receiver.
        endpoint: "localhost:4317"

        # Use a plaintext connection. Drop this (and configure tls_config) when
        # talking to a TLS-enabled collector.
        insecure: true
    }

    # Fraction of requests to trace, in [0.0, 1.0]. Defaults to 1.0 (trace
    # everything) once a tracing config is present. Here we trace 10% of
    # requests instead.
    sampling_fraction: 0.1

    # Propagators used to inject trace context into outgoing requests. Defaults
    # to ["tracecontext", "baggage"] if omitted.
    propagator: "tracecontext"
    propagator: "baggage"

    # Extra attributes attached to every span via the trace resource.
    resource_attribute {
        key: "service.namespace"
        value: "infra-monitoring"
    }
}
