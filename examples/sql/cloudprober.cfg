# SQL probe examples. Run against a local postgres, e.g.:
#   docker run --rm -e POSTGRES_PASSWORD=cloudprober -p 5432:5432 postgres
#   DB_PASSWORD=cloudprober ./cloudprober --config_file=examples/sql/cloudprober.cfg --logtostderr
#
# Watch metrics:
#   tail -f /tmp/cloudprober-sql.metrics

# Connectivity check: connect, authenticate, and ping the server. Host and
# port come from the target; a new connection is established on every run, so
# latency covers the full connect + auth path.
probe {
  name: "postgres_up"
  type: SQL
  targets {
    host_names: "localhost:5432"
  }
  interval: "10s"
  timeout: "5s"
  sql_probe {
    flavor: POSTGRES
    user: "postgres"
    password: "{{envSecret "DB_PASSWORD"}}"
    database: "postgres"
  }
}

# Query probe: host and port come from the target, connection_string carries
# everything else. Query results ("name value" lines) are exported as metrics
# via response_metrics_options, and checked by the validator.
probe {
  name: "postgres_stats"
  type: SQL
  targets {
    host_names: "localhost:5432"
  }
  interval: "30s"
  timeout: "5s"
  sql_probe {
    flavor: POSTGRES
    connection_string: "user=postgres dbname=postgres"
    password: "{{envSecret "DB_PASSWORD"}}"
    query: "SELECT 'active_connections', count(*) FROM pg_stat_activity"
    response_metrics_options {
      metrics_kind: GAUGE
    }
  }
  validator {
    name: "has_connections"
    regex: "active_connections [1-9][0-9]*"
  }
}

# dummy_targets: no per-target fan-out, so connection_string's host/port are
# used as-is. Useful for pasting a connection string a cloud provider handed
# you (RDS, Cloud SQL, Supabase, ...) without editing it.
probe {
  name: "postgres_up_dummy_target"
  type: SQL
  targets {
    dummy_targets {}
  }
  interval: "10s"
  timeout: "5s"
  sql_probe {
    flavor: POSTGRES
    connection_string: "postgres://postgres@localhost:5432/postgres"
    password: "{{envSecret "DB_PASSWORD"}}"
  }
}

surfacer {
  type: FILE
  file_surfacer {
    file_path: "/tmp/cloudprober-sql.metrics"
  }
}
