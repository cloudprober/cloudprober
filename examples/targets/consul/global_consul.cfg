# Example demonstrating global Consul configuration
#
# This shows how to configure Consul settings globally so they can be shared
# across multiple probes without repeating the configuration.
#
# Advanced Features (not shown in this basic example):
#
# - TLS Configuration: Add a tls{} block to global_consul_options{} for secure connections.
#   See internal/rds/consul/proto/global.proto for TLSConfig options (ca_file, cert_file, key_file).
#
# - Kubernetes Auto-Discovery: Set address: "auto-discover" (or CONSUL_HTTP_ADDR="auto-discover")
#   to automatically discover Consul service in Kubernetes. Optionally add a kubernetes_service{}
#   block to customize namespace, service_name, and port.
#
# - Environment Variables: All standard Consul environment variables are supported
#   (CONSUL_HTTP_ADDR, CONSUL_HTTP_TOKEN, CONSUL_CACERT, CONSUL_DATACENTER, etc.).
#   Configuration values take precedence over environment variables.

# Configure Consul connection globally for all Consul-based targets.
# Multiple global_consul_options entries can be defined, each with a unique id,
# to connect to different Consul clusters (e.g. prod and staging).
# A probe's consul_id field selects which entry to use.
# If consul_id is not set, the first entry is used.
global_targets_options {
  # Primary (production) Consul cluster
  global_consul_options {
    id: "prod"
    address: "consul-prod.example.com:8500"
    datacenter: "dc1"
    # token: "prod-acl-token"
  }

  # Secondary (staging) Consul cluster
  global_consul_options {
    id: "staging"
    address: "consul-staging.example.com:8500"
    datacenter: "dc1"
    # token: "staging-acl-token"
  }
}

# Probe 1: Uses the "prod" Consul cluster (explicit consul_id)
probe {
  name: "web_services_prod"
  type: HTTP

  targets {
    consul {
      consul_id: "prod"
      services: "web-.*"
      health_status: "passing"
    }
  }

  http_probe {
    relative_url: "/health"
  }

  interval_msec: 10000
}

# Probe 2: Uses the "staging" Consul cluster
probe {
  name: "web_services_staging"
  type: HTTP

  targets {
    consul {
      consul_id: "staging"
      services: "web-.*"
      health_status: "passing"
    }
  }

  http_probe {
    relative_url: "/health"
  }

  interval_msec: 15000
}

# Probe 3: No consul_id — falls back to the first global_consul_options ("prod")
probe {
  name: "api_services"
  type: HTTP

  targets {
    consul {
      services: "api-.*"
      tags: "production"
      health_status: "passing"
    }
  }

  http_probe {
    relative_url: "/api/health"
  }

  interval_msec: 15000
}

# Export metrics to Prometheus
surfacer {
  type: PROMETHEUS
}
