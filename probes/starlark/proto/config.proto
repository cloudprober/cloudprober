syntax = "proto2";

package cloudprober.probes.starlark;

import "github.com/cloudprober/cloudprober/common/oauth/proto/config.proto";
import "github.com/cloudprober/cloudprober/common/tlsconfig/proto/config.proto";
import "github.com/cloudprober/cloudprober/metrics/payload/proto/config.proto";

option go_package = "github.com/cloudprober/cloudprober/probes/starlark/proto";

// ProbeConf configures a Starlark probe.
//
// The probe runs a user-supplied Starlark function once per resolved target
// each interval. Wall time of the call becomes the probe's latency. Clean
// return is success; any unhandled error (including assertion failures) is
// failure.
message ProbeConf {
  // Source of the Starlark code. Exactly one of source or source_file must
  // be set.
  optional string source      = 1;
  optional string source_file = 2;

  // Name of the entry-point function. It must accept a single argument: the
  // target. The target is a struct-like value mirroring fields from
  // cloudprober's targets/endpoint.Endpoint:
  //   target.name    (string)        — Endpoint.Name (host or IP)
  //   target.port    (int)           — Endpoint.Port (0 if none)
  //   target.ip      (string)        — Endpoint.IP, stringified ("" if nil)
  //   target.labels  (dict[str,str]) — Endpoint.Labels, frozen
  // Example:
  //   def probe(target):
  //       url = "http://%s:%d/healthz" % (target.name, target.port)
  //       env = target.labels.get("env", "unknown")
  //       ...
  // Defaults to "probe".
  optional string entry_point = 3 [default = "probe"];

  // Variables exposed to the script via vars.get(name, default=None).
  //
  // Deliberately not named env_var: external/browser probes use that name
  // for "passed to subprocess env"; there's no subprocess here. For host
  // environment values, bake them in via the config-load template layer
  // (e.g. {{ envVar "PASS" }}).
  map<string, string> vars = 4;

  // Custom metric emission options, used by the print_metric() builtin. Same
  // shape external + http probes already use, so kind (CUMULATIVE / GAUGE),
  // distribution-bucket configuration, in-cloudprober aggregation, and
  // additional labels all carry over with no Starlark-specific surface.
  optional metrics.payload.OutputMetricsOptions output_metrics_options = 5;

  // Default TLS config for outbound HTTPS calls made by the script. Applies
  // to every http call that doesn't select a different one via the tls kwarg
  // (see tls_configs) — set this when the script targets hosts that need a
  // custom CA bundle, a client certificate (mTLS), an SNI override, or
  // disabled cert validation. Same message the HTTP probe uses; see
  // common/tlsconfig/proto/config.proto for the full field list.
  optional tlsconfig.TLSConfig tls_config = 6;

  // Alternate TLS configs, keyed by a name the script uses to select one via
  // the tls kwarg on http calls:
  //   http.get(url, tls="internal")
  //
  // A script routinely hits several hosts in one run, and TLS settings are
  // per-host in a way the HTTP probe never has to deal with: ca_cert_file
  // *replaces* the system CA pool (so a probe-wide internal CA breaks any
  // public host the same script touches), server_name is an SNI override for
  // one host by definition, and disable_cert_validation is rarely meant for
  // every host. Name the exceptions here and leave tls_config as the default:
  //   tls_config { ca_cert_file: "/etc/ssl/corp.pem" }   # most hosts
  //   tls_configs {
  //     key: "legacy"
  //     value { disable_cert_validation: true }          # just this one
  //   }
  //   def probe(target):
  //       http.get("https://internal/healthz")               # tls_config
  //       http.get("https://legacy/healthz", tls="legacy")    # override
  //
  // Omitting the tls kwarg always means tls_config (or Go's defaults when
  // that is unset), never "the only entry here" — a single tls_configs entry
  // must still be asked for by name. Passing an empty tls is an error rather
  // than the default, so a computed selector fails loudly:
  //   http.get(url, tls=target.labels["tls_profile"])  # missing label: error
  map<string, tlsconfig.TLSConfig> tls_configs = 8;

  // OAuth token sources, keyed by a name the script uses to select one. Same
  // oauth.Config message the HTTP probe uses, so every source (file, command,
  // HTTP token endpoint, GCE metadata, k8s token file, Google credentials,
  // self-signed JWT), plus refresh/expiry handling, carries over.
  //
  // Unlike the HTTP probe, tokens are NOT auto-injected: a Starlark script
  // routinely hits several hosts in one run, so it must ask for the token
  // explicitly and decide where it goes, via the oauth builtin:
  //   oauth.token(name="")  -- raw access token ("eyJ...")
  //   oauth.header(name="") -- formatted Authorization value ("Bearer eyJ...")
  // name may be omitted when exactly one config is present. Example:
  //   oauth_configs {
  //     key: "api"
  //     value { http_request { token_url: "https://issuer/token" ... } }
  //   }
  //   def probe(target):
  //       r = http.get(url, headers={"Authorization": oauth.header("api")})
  map<string, oauth.Config> oauth_configs = 7;
}
