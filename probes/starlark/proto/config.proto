syntax = "proto2";

package cloudprober.probes.starlark;

import "github.com/cloudprober/cloudprober/metrics/payload/proto/config.proto";

option go_package = "github.com/cloudprober/cloudprober/probes/starlark/proto";

// ProbeConf configures a Starlark probe.
//
// The probe runs a user-supplied Starlark function once per resolved target
// each interval. Wall time of the call becomes the probe's latency. Clean
// return is success; any unhandled error (including assertion failures) is
// failure.
message ProbeConf {
  // Source of the Starlark code. Exactly one of source or source_file must
  // be set.
  optional string source      = 1;
  optional string source_file = 2;

  // Name of the entry-point function. It must accept a single argument: the
  // target. The target is a struct-like value mirroring fields from
  // cloudprober's targets/endpoint.Endpoint:
  //   target.name    (string)        — Endpoint.Name (host or IP)
  //   target.port    (int)           — Endpoint.Port (0 if none)
  //   target.ip      (string)        — Endpoint.IP, stringified ("" if nil)
  //   target.labels  (dict[str,str]) — Endpoint.Labels, frozen
  // Example:
  //   def probe(target):
  //       url = "http://%s:%d/healthz" % (target.name, target.port)
  //       env = target.labels.get("env", "unknown")
  //       ...
  // Defaults to "probe".
  optional string entry_point = 3 [default = "probe"];

  // Variables exposed to the script via vars.get(name, default=None).
  //
  // Deliberately not named env_var: external/browser probes use that name
  // for "passed to subprocess env"; there's no subprocess here. For host
  // environment values, bake them in via the config-load template layer
  // (e.g. {{ envVar "PASS" }}).
  map<string, string> vars = 4;

  // Custom metric emission options, used by the print_metric() builtin. Same
  // shape external + http probes already use, so kind (CUMULATIVE / GAUGE),
  // distribution-bucket configuration, in-cloudprober aggregation, and
  // additional labels all carry over with no Starlark-specific surface.
  optional metrics.payload.OutputMetricsOptions output_metrics_options = 5;
}
