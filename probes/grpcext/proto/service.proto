syntax = "proto3";

package cloudprober.probes.grpcext;

import "google/protobuf/duration.proto";

option go_package = "github.com/cloudprober/cloudprober/probes/grpcext/proto";

// Prober is the contract between cloudprober and a probe sidecar. It is the
// wire version of cloudprober's internal per-target probe callback
// (sched.RunProbeForTarget): cloudprober calls Probe once per probe cycle per
// target; the sidecar runs the actual probe logic and returns the result.
//
// A sidecar can be written in any language; the Go SDK
// (github.com/cloudprober/cloudprober/sidecar) removes most of the
// boilerplate.
service Prober {
  // Probe runs one probe cycle for one target.
  rpc Probe(ProbeRequest) returns (ProbeResponse);
}

// Target mirrors cloudprober's targets/endpoint.Endpoint.
message Target {
  string name = 1;
  map<string, string> labels = 2;
  string ip = 3;  // Resolved IP, if available. Stringified, "" if none.
  int32 port = 4;
}

message ProbeRequest {
  // Probe type registered on the sidecar, e.g. "snowsql".
  string probe_type = 1;

  Target target = 2;

  // Type-specific config, opaque to cloudprober (typically JSON). Same bytes
  // as the "config" field in the probe's cloudprober config.
  bytes config = 3;

  // Probe timeout. The RPC context carries the same deadline; this field
  // makes it available to sidecars whose language/framework doesn't surface
  // gRPC deadlines conveniently.
  google.protobuf.Duration timeout = 4;

  // Opaque per-target session handle, echoed back from the last
  // ProbeResponse for this target. Empty on first contact or after
  // cloudprober restart. The handle is a hint: on unknown/stale handle
  // (e.g. sidecar restarted), the sidecar re-initializes per-target state
  // and mints a fresh one.
  bytes state_handle = 5;
}

message ProbeResponse {
  // Did the probe succeed? This is about the target, not the sidecar; see
  // internal_error below.
  bool success = 1;

  // Probe latency as measured by the sidecar. Excludes the
  // cloudprober<->sidecar hop.
  google.protobuf.Duration latency = 2;

  // internal_error indicates a sidecar/infra failure, NOT "target down".
  // Cloudprober records it separately (internal_errors metric) instead of
  // counting the run as a probe failure, so a broken sidecar doesn't look
  // like a broken target.
  bool internal_error = 3;

  string error = 4;

  // Additional metrics in cloudprober payload format, one metric per line:
  //   "name value" or "name{key=val,key2=val2} value"
  // Parsed by cloudprober with metrics/payload (same as external and http
  // probes' custom metrics).
  repeated string payload = 5;

  // Session handle to store for this target and echo in the next
  // ProbeRequest. Sidecars that don't need per-target sessions leave this
  // empty.
  bytes state_handle = 6;
}
